<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="app.css" rel="stylesheet">

    <script src="app.js" defer></script>
</head>


<body class="">
    <div id="header"></div>
    <div class="container">
        <h2>Login</h2>

        <form id="loginForm">
            <input class="form-control mb-2" id="email" placeholder="email">
            <input class="form-control mb-2" id="password" type="password" placeholder="password">

            <button class="btn btn-primary" id="loginButton">Login</button>
        </form>
        <div id="afterLogin" class="mt-3"></div>

        <div id="error" class="text-danger mt-3"></div>

        <script>
            document.getElementById("loginForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;

                const errorDiv = document.getElementById("error");

                errorDiv.textContent = ""; // reset

                try {
                    const res = await fetch(SERVER + "/login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Accept": "application/json"
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await res.json();

                    console.log("STATUS:", res.status);
                    console.log("RESPONSE:", data);

                    // backend error case
                    if (!res.ok) {
                        errorDiv.textContent = "Hiba: " + JSON.stringify(data);
                        return;
                    }

                    // no token case
                    if (!data.access_token) {
                        errorDiv.textContent = "Sikerült a kérés, de nincs token: " + JSON.stringify(data);
                        return;
                    }

                    // success UI
                    errorDiv.style.color = "green";
                    errorDiv.textContent =
                        "Sikeres login!" + JSON.stringify(data);

                    // store data
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("user", data.user)
                    localStorage.setItem("role", data.role)

                    document.getElementById('loginButton').disabled = true;
                    document.getElementById('loginButton').textContent = "Logged in";
                    document.getElementById('loginForm').style.display = "none";

                    // redirect gomb
                    const btn = document.createElement("button");
                    btn.className = "btn btn-success";
                    btn.textContent = "Go to Index";

                    btn.onclick = () => {
                        window.location.href = CLIENT + "/index.html";
                    };

                    document.getElementById("afterLogin").appendChild(btn);
                    // auto redirect after 3 mp
                    setTimeout(() => {
                        window.location.href = CLIENT + "/index.html";
                    }, 3000);

                } catch (err) {
                    errorDiv.style.color = "red";
                    errorDiv.textContent = "Network hiba: " + err.message;
                }
            });
        </script>
    </div>
</body>

</html>
